<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adaptive IQ Tester</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      margin: 10px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: white;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

<!-- HOME -->
<div class="container" id="home">
  <h1>🧠 Adaptive IQ Tester</h1>
  <button onclick="showAge()">Start</button>
</div>

<!-- AGE INPUT -->
<div class="container" id="ageBox" style="display:none;">
  <h2>Enter Your Age</h2>
  <input type="number" id="age" placeholder="Your age"/>
  <br>
  <button onclick="startGame()">Next</button>
</div>

<!-- GAME -->
<div class="container" id="game" style="display:none;">
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<script>
let questions = [];
let current = 0;
let score = 0;

// Question sets
let easy = [
  {q:"2 + 2 = ?", options:[3,4,5], answer:4},
  {q:"5 + 3 = ?", options:[6,7,8], answer:8}
];

let medium = [
  {q:"2,4,8,?", options:[12,16,20], answer:16},
  {q:"3,6,12,?", options:[18,24,30], answer:24}
];

let hard = [
  {q:"1,1,2,3,5,?", options:[6,8,10], answer:8},
  {q:"10,20,30,?", options:[40,50,60], answer:40}
];

// UI functions
function showAge(){
  document.getElementById("home").style.display="none";
  document.getElementById("ageBox").style.display="block";
}

function startGame(){
  let age = document.getElementById("age").value;

  if(age < 10){
    questions = easy;
  } else if(age < 18){
    questions = medium;
  } else {
    questions = hard;
  }

  document.getElementById("ageBox").style.display="none";
  document.getElementById("game").style.display="block";

  loadQuestion();
}

function loadQuestion(){
  let q = questions[current];
  document.getElementById("question").innerText = q.q;

  let html = "";
  q.options.forEach(opt=>{
    html += `<button onclick="check(${opt})">${opt}</button><br>`;
  });

  document.getElementById("options").innerHTML = html;
}

function check(ans){
  if(ans === questions[current].answer){
    score++;
    alert("Correct ✅");
  } else {
    alert("Wrong ❌");
  }

  current++;

  if(current < questions.length){
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("game").innerHTML =
    `<h2>Your Score: ${score}/${questions.length}</h2>
     <button onclick="location.reload()">Restart</button>`;
}
</script>

</body>
</html>
